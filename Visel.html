<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виселица • Dark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7), inset 0 0 0 1px #333;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }
        .word-display {
            background: #0f0f0f;
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #444;
        }
        .word {
            font-family: 'Courier New', monospace;
            font-size: 2.8rem;
            font-weight: 700;
            color: #00ff99;
            text-shadow: 0 0 8px #00ff9966;
            letter-spacing: 8px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            background: #2a2a2a;
            border-radius: 40px;
            padding: 15px 20px;
            margin-bottom: 25px;
            color: #e0e0e0;
            font-size: 1.2rem;
        }
        .guesses {
            color: #ff9966;
            font-weight: 600;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .guess-input {
            flex: 1;
            background: #0f0f0f;
            border: 1px solid #444;
            border-radius: 60px;
            padding: 16px 20px;
            color: #fff;
            font-size: 1.4rem;
            text-align: center;
            outline: none;
        }
        .guess-input:focus {
            border-color: #00ff99;
            box-shadow: 0 0 8px #00ff9966;
        }
        .btn {
            background: #2a2a2a;
            border: none;
            border-radius: 60px;
            padding: 16px 30px;
            color: #e0e0e0;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f0f0f;
            transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f0f;
        }
        .btn:hover {
            background: #3a3a3a;
        }
        .message {
            color: #ffaa66;
            font-size: 1rem;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Виселица</h2>
        <div class="word-display">
            <div class="word" id="word">_ _ _ _ _</div>
        </div>
        <div class="info">
            <span>Осталось попыток:</span>
            <span class="guesses" id="guesses">6</span>
        </div>
        <div class="input-area">
            <input type="text" class="guess-input" id="guessInput" maxlength="1" placeholder="буква">
            <button class="btn" id="guessBtn">Угадать</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        (function() {
            const words = ["hangman", "java", "swing", "programming", "openai"];
            let word = '';
            let hidden = [];
            let attempts = 6;
            let gameActive = true;

            const wordEl = document.getElementById('word');
            const guessesEl = document.getElementById('guesses');
            const input = document.getElementById('guessInput');
            const guessBtn = document.getElementById('guessBtn');
            const messageEl = document.getElementById('message');

            function initGame() {
                word = words[Math.floor(Math.random() * words.length)];
                hidden = Array(word.length).fill('_');
                attempts = 6;
                gameActive = true;
                updateDisplay();
                messageEl.textContent = '';
                input.value = '';
                input.disabled = false;
                guessBtn.disabled = false;
                input.focus();
            }

            function updateDisplay() {
                wordEl.textContent = hidden.join(' ');
                guessesEl.textContent = attempts;
            }

            function checkGame() {
                if (!hidden.includes('_')) {
                    messageEl.textContent = 'Победа! Загадано слово: ' + word;
                    gameActive = false;
                    input.disabled = true;
                    guessBtn.disabled = true;
                    setTimeout(initGame, 2000);
                } else if (attempts <= 0) {
                    messageEl.textContent = 'Поражение! Слово: ' + word;
                    gameActive = false;
                    input.disabled = true;
                    guessBtn.disabled = true;
                    setTimeout(initGame, 2000);
                }
            }

            function makeGuess(letter) {
                if (!gameActive) return;
                letter = letter.toLowerCase();
                if (!/[a-z]/.test(letter)) {
                    messageEl.textContent = 'Введите букву a-z';
                    return;
                }
                if (hidden.includes(letter)) {
                    messageEl.textContent = 'Буква уже открыта';
                    return;
                }

                let found = false;
                for (let i = 0; i < word.length; i++) {
                    if (word[i] === letter) {
                        hidden[i] = letter;
                        found = true;
                    }
                }

                if (found) {
                    messageEl.textContent = `Есть буква ${letter}!`;
                } else {
                    attempts--;
                    messageEl.textContent = `Нет буквы ${letter}.`;
                }

                updateDisplay();
                checkGame();
            }

            guessBtn.addEventListener('click', () => {
                const val = input.value.trim();
                if (val.length === 0) {
                    messageEl.textContent = 'Введите букву';
                    return;
                }
                makeGuess(val[0]);
                input.value = '';
                input.focus();
            });

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') guessBtn.click();
            });

            initGame();
        })();
    </script>
</body>
</html>
